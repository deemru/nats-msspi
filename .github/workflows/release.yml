name: Release
on: push

env:
  golang-version: '1.22.12'
  go-cpro-version: 'v1.22.12-msspi-1'
  nats-server-version: 'v2.10.25'
  nats-streaming-server-version: 'v0.25.6-20250205'

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        include:
        - os: windows-latest
          platform: win64
          aext: zip
        - os: ubuntu-latest
          platform: linux
          aext: tgz
        - os: macos-latest
          platform: darwin
          aext: tgz
        - os: ubuntu-latest
          platform: linux-glibc-2.24
          aext: tgz
          legacy: debian9

    name: Setup
    steps:
    - uses: actions/checkout@v2
    - uses: actions/setup-go@v2
      if: ${{ matrix.legacy != 'debian9' }}
      with:
        go-version: ${{ env.golang-version }}

    - name: Setup CryptoPro/go
      if: ${{ matrix.legacy != 'debian9' }}
      env:
        PROJECTTAG: ${{ env.go-cpro-version }}
      shell: bash
      run: |
        cd $RUNNER_TEMP
        git -c advice.detachedHead=false clone --depth 1 --branch ${PROJECTTAG} https://github.com/CryptoPro/go.git
        cd go
        git submodule update --init --recursive --depth 1
        cd src/go-msspi/msspi/build_linux
        make -B static
        if [ "$RUNNER_OS" != "Windows" ]; then
          make -B static-capix
        fi
        cp -rf $RUNNER_TEMP/go/src $GOROOT

    - name: Build legacy Debian 9 image
      if: ${{ matrix.legacy == 'debian9' }}
      shell: bash
      run: |
        docker build \
          --build-arg GO_VERSION=${{ env.golang-version }} \
          -t nats-msspi-debian9-go:${{ env.golang-version }} \
          - <<'EOF'
        FROM debian:9

        ARG GO_VERSION=1.22.12

        RUN printf '%s\n' \
              'deb http://archive.debian.org/debian stretch main' \
              'deb http://archive.debian.org/debian-security stretch/updates main' \
              > /etc/apt/sources.list \
         && apt-get update -o Acquire::Check-Valid-Until=false \
         && apt-get install -y --no-install-recommends \
              ca-certificates \
              curl \
              g++ \
              gcc \
              git \
              gzip \
              make \
              tar \
              xz-utils \
         && rm -rf /var/lib/apt/lists/*

        RUN curl -fsSL "https://go.dev/dl/go${GO_VERSION}.linux-amd64.tar.gz" -o /tmp/go.tgz \
         && tar -C /usr/local -xzf /tmp/go.tgz \
         && rm /tmp/go.tgz

        ENV PATH="/usr/local/go/bin:${PATH}"
        ENV CGO_ENABLED=1

        WORKDIR /work
        EOF

    - name: Build legacy linux-glibc-2.24 packages
      if: ${{ matrix.legacy == 'debian9' }}
      env:
        GO_CPRO_VERSION: ${{ env.go-cpro-version }}
        NATS_SERVER_VERSION: ${{ env.nats-server-version }}
        NATS_STREAMING_SERVER_VERSION: ${{ env.nats-streaming-server-version }}
        PLATFORM: ${{ matrix.platform }}
        AEXT: ${{ matrix.aext }}
      shell: bash
      run: |
        docker run --rm \
          -e GO_CPRO_VERSION \
          -e NATS_SERVER_VERSION \
          -e NATS_STREAMING_SERVER_VERSION \
          -e PLATFORM \
          -e AEXT \
          -v "$PWD:/work" \
          -w /work \
          nats-msspi-debian9-go:${{ env.golang-version }} \
          bash -c '
            set -euo pipefail
            export PATH="/usr/local/go/bin:${PATH}"

            cd /tmp
            git -c advice.detachedHead=false clone --depth 1 --branch "${GO_CPRO_VERSION}" https://github.com/CryptoPro/go.git
            cd go
            git submodule update --init --recursive --depth 1
            cd src/go-msspi/msspi/build_linux
            make -B static
            make -B static-capix
            cp -rf /tmp/go/src /usr/local/go

            build_project() {
              local owner="$1"
              local project="$2"
              local tag="$3"

              cd /work
              git -c advice.detachedHead=false clone --depth 1 --branch "${tag}" "https://github.com/${owner}/${project}.git"
              cd "${project}"
              go build -v
              go build -v -gcflags="all=-N -l" -o "${project}_debug"
              tar -zcvf "${project}_${tag}_${PLATFORM}.${AEXT}" "./${project}"
              tar -zcvf "${project}_${tag}_${PLATFORM}_debug.${AEXT}" "./${project}_debug"
            }

            build_project nats-io nats-server "${NATS_SERVER_VERSION}"
            build_project CryptoPro nats-streaming-server "${NATS_STREAMING_SERVER_VERSION}"
          '

    - name: Build nats-server
      if: ${{ matrix.legacy != 'debian9' }}
      env:
        PROJECTNAME: 'nats-server'
        PROJECTTAG: ${{ env.nats-server-version }}
        PLATFORM: ${{ matrix.platform }}
        AEXT: ${{ matrix.aext }}
      shell: bash
      run: |
        git -c advice.detachedHead=false clone --depth 1 --branch ${PROJECTTAG} https://github.com/nats-io/${PROJECTNAME}.git
        cd ${PROJECTNAME}
        go build -v
        if [ "$RUNNER_OS" == "Windows" ]; then
          go build -v -gcflags="all=-N -l" -o ${PROJECTNAME}_debug.exe
        else
          go build -v -gcflags="all=-N -l" -o ${PROJECTNAME}_debug
        fi
        if [ "$RUNNER_OS" == "Windows" ]; then
          7z a -mm=Deflate -mfb=258 -mpass=15 -r ${PROJECTNAME}_${PROJECTTAG}_${PLATFORM}.${AEXT} ./${PROJECTNAME}.exe
          7z a -mm=Deflate -mfb=258 -mpass=15 -r ${PROJECTNAME}_${PROJECTTAG}_${PLATFORM}_debug.${AEXT} ./${PROJECTNAME}_debug.exe
        elif [ "$RUNNER_OS" == "Linux" ]; then
          tar -zcvf ${PROJECTNAME}_${PROJECTTAG}_${PLATFORM}.${AEXT} ./${PROJECTNAME}
          tar -zcvf ${PROJECTNAME}_${PROJECTTAG}_${PLATFORM}_debug.${AEXT} ./${PROJECTNAME}_debug
        elif [ "$RUNNER_OS" == "macOS" ]; then
          tar -zcvf ${PROJECTNAME}_${PROJECTTAG}_${PLATFORM}.${AEXT} ./${PROJECTNAME}
          tar -zcvf ${PROJECTNAME}_${PROJECTTAG}_${PLATFORM}_debug.${AEXT} ./${PROJECTNAME}_debug
        else
          exit 1
        fi

    - name: Build nats-streaming-server
      if: ${{ matrix.legacy != 'debian9' }}
      env:
        PROJECTNAME: 'nats-streaming-server'
        PROJECTTAG: ${{ env.nats-streaming-server-version }}
        PLATFORM: ${{ matrix.platform }}
        AEXT: ${{ matrix.aext }}
      shell: bash
      run: |
        git -c advice.detachedHead=false clone --depth 1 --branch ${PROJECTTAG} https://github.com/CryptoPro/${PROJECTNAME}.git
        cd ${PROJECTNAME}
        go build -v
        if [ "$RUNNER_OS" == "Windows" ]; then
          go build -v -gcflags="all=-N -l" -o ${PROJECTNAME}_debug.exe
        else
          go build -v -gcflags="all=-N -l" -o ${PROJECTNAME}_debug
        fi
        if [ "$RUNNER_OS" == "Windows" ]; then
          7z a -mm=Deflate -mfb=258 -mpass=15 -r ${PROJECTNAME}_${PROJECTTAG}_${PLATFORM}.${AEXT} ./${PROJECTNAME}.exe
          7z a -mm=Deflate -mfb=258 -mpass=15 -r ${PROJECTNAME}_${PROJECTTAG}_${PLATFORM}_debug.${AEXT} ./${PROJECTNAME}_debug.exe
        elif [ "$RUNNER_OS" == "Linux" ]; then
          tar -zcvf ${PROJECTNAME}_${PROJECTTAG}_${PLATFORM}.${AEXT} ./${PROJECTNAME}
          tar -zcvf ${PROJECTNAME}_${PROJECTTAG}_${PLATFORM}_debug.${AEXT} ./${PROJECTNAME}_debug
        elif [ "$RUNNER_OS" == "macOS" ]; then
          tar -zcvf ${PROJECTNAME}_${PROJECTTAG}_${PLATFORM}.${AEXT} ./${PROJECTNAME}
          tar -zcvf ${PROJECTNAME}_${PROJECTTAG}_${PLATFORM}_debug.${AEXT} ./${PROJECTNAME}_debug
        else
          exit 1
        fi

    - name: Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: |
          nats-server/nats-server_${{ env.nats-server-version }}_${{ matrix.platform }}.${{ matrix.aext }}
          nats-server/nats-server_${{ env.nats-server-version }}_${{ matrix.platform }}_debug.${{ matrix.aext }}
          nats-streaming-server/nats-streaming-server_${{ env.nats-streaming-server-version }}_${{ matrix.platform }}.${{ matrix.aext }}
          nats-streaming-server/nats-streaming-server_${{ env.nats-streaming-server-version }}_${{ matrix.platform }}_debug.${{ matrix.aext }}
